name = "{{.ProjectName}}"
# project_id = ""  # Pin deploys to a specific project: run 'aerostack link --write-toml'
main = "src/index.ts"
compatibility_date = "2024-01-01"

[[postgres_databases]]
binding = "PG"
connection_string = "$DATABASE_URL"

[[kv_namespaces]]
binding = "CACHE"
id = "local-kv"

[[queues.producers]]
binding = "QUEUE"
queue = "local-queue"
