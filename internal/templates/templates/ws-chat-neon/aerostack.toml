name = "{{.ProjectName}}"
# project_id = ""  # Pin deploys to a specific project: run 'aerostack link --write-toml'
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat_v2"]

[[postgres_databases]]
binding = "PG"
connection_string = "$DATABASE_URL"
pool_size = 10

[[kv_namespaces]]
binding = "CACHE"
id = "local-kv"
